name: E2E Test Optimized

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

jobs:
  # 预构建阶段，缓存依赖和构建产物
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Restore Cypress binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            .next
            build
            dist
          key: build-${{ runner.os }}-${{ hashFiles('**/yarn.lock', '**/package.json', 'src/**', 'public/**') }}

      - name: Build application
        run: yarn build

  # 并行测试阶段
  test:
    runs-on: ubuntu-22.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        containers: [0, 1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore Cypress binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .next
            build
            dist
          key: build-${{ runner.os }}-${{ hashFiles('**/package.json', 'src/**', 'public/**') }}

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          build: echo "Build cached, skipping"
          start: yarn start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 30
          command: npm run cy:run:parallel
          browser: chrome
          record: true
          parallel: true
        env:
          CI: true
          SPLIT: 5
          SPLIT_INDEX: ${{ matrix.containers }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_JOB: ${{ github.job }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 优化内存和性能
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # 快速测试 - 只运行关键测试用例
  smoke-test:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Restore Cypress binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CYPRESS_CACHE_FOLDER }}
          key: cypress-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/yarn
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Build application
        run: yarn build

      - name: Run smoke tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          build: echo "Build cached, skipping"
          start: yarn start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 30
          spec: cypress/e2e/smoke/**/*.cy.js
          browser: chrome
        env:
          CI: true
