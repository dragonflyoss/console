name: E2E Test

on: push

jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        containers: [0, 1, 2, 3, 4]
    env:
      NODE_ENV: production
      YARN_ENABLE_LOCKFILE: false
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: '18.x'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}-${{ github.sha }}
          restore-keys: |
            deps-${{ runner.os }}-${{ hashFiles('package.json') }}-

      - name: Install dependencies
        run: yarn install --no-lockfile

      - name: Build application
        run: yarn build
        env:
          NODE_ENV: production
          GENERATE_SOURCEMAP: false

      - name: Start server
        run: yarn start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Cypress tests
        run: yarn cy:run:parallel
        env:
          CI: true
          DEBUG: 'cypress-split,find-cypress-specs'
          SPLIT: 5
          SPLIT_INDEX: ${{ matrix.containers }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_JOB: ${{ github.job }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
